<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Brief Agent</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface-elevated: #1f2937;
    --border: #374151;
    --text: #f3f4f6;
    --text-dim: #9ca3af;
    --accent: #fbbf24;
    --accent-soft: #fbbf2415;
    --green: #10b981;
    --red: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }
  header {
    border-bottom: 1px solid var(--border);
    padding: 2rem 1.5rem;
    background: var(--surface);
  }
  header .inner {
    max-width: 900px;
    margin: 0 auto;
  }
  header h1 {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  header h1 .accent { color: var(--accent); }
  header p {
    color: var(--text-dim);
    margin-top: 0.5rem;
    font-size: 0.95rem;
  }
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }
  .layout {
    display: grid;
    grid-template-columns: 240px 1fr;
    gap: 2rem;
  }
  @media (max-width: 720px) {
    .layout { grid-template-columns: 1fr; }
  }
  .sidebar h2 {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    margin-bottom: 0.75rem;
  }
  .brief-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }
  .brief-list a {
    display: block;
    padding: 0.5rem 0.75rem;
    color: var(--text-dim);
    text-decoration: none;
    border-radius: 6px;
    font-size: 0.9rem;
    transition: all 0.15s;
  }
  .brief-list a:hover {
    background: var(--surface);
    color: var(--text);
  }
  .brief-list a.active {
    background: var(--accent-soft);
    color: var(--accent);
    font-weight: 500;
  }
  .content {
    background: var(--surface);
    border-radius: 12px;
    padding: 2.5rem;
    border: 1px solid var(--border);
    min-height: 500px;
  }
  .content h1 {
    font-size: 1.75rem;
    margin-bottom: 0.5rem;
    letter-spacing: -0.01em;
  }
  .content h2 {
    font-size: 1.25rem;
    margin-top: 2rem;
    margin-bottom: 0.75rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  .content h3 {
    font-size: 1.05rem;
    margin-top: 1.5rem;
    margin-bottom: 0.5rem;
    color: var(--accent);
  }
  .content p { margin-bottom: 1rem; }
  .content ul, .content ol { margin: 1rem 0 1rem 1.5rem; }
  .content li { margin-bottom: 0.4rem; }
  .content blockquote {
    border-left: 3px solid var(--accent);
    background: var(--accent-soft);
    padding: 1rem 1.25rem;
    margin: 1.5rem 0;
    border-radius: 0 8px 8px 0;
  }
  .content blockquote p:last-child { margin-bottom: 0; }
  .content em { color: var(--text-dim); }
  .content strong { color: var(--text); }
  .content table {
    width: 100%;
    border-collapse: collapse;
    margin: 1rem 0;
    font-size: 0.9rem;
  }
  .content th, .content td {
    padding: 0.5rem 0.75rem;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .content th {
    color: var(--text-dim);
    font-weight: 600;
    font-size: 0.8rem;
    text-transform: uppercase;
  }
  .content hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 2rem 0;
  }
  .empty {
    text-align: center;
    color: var(--text-dim);
    padding: 4rem 1rem;
  }
  .empty .icon { font-size: 2.5rem; margin-bottom: 1rem; }
  footer {
    text-align: center;
    color: var(--text-dim);
    font-size: 0.8rem;
    padding: 2rem 1rem;
    border-top: 1px solid var(--border);
    margin-top: 3rem;
  }
  footer a { color: var(--text-dim); text-decoration: underline; }
</style>
</head>
<body>
  <header>
    <div class="inner">
      <h1>Market <span class="accent">Brief</span> Agent</h1>
      <p>Autonomous AI research analyst — daily briefings on 26 global instruments.</p>
    </div>
  </header>

  <main>
    <div class="layout">
      <aside class="sidebar">
        <h2>Briefs</h2>
        <ul class="brief-list" id="brief-list">
          <li style="color: var(--text-dim); font-size: 0.85rem; padding: 0.5rem 0.75rem;">Loading…</li>
        </ul>
      </aside>
      <article class="content" id="content">
        <div class="empty">
          <div class="icon">📊</div>
          <p>Select a brief to read</p>
        </div>
      </article>
    </div>
  </main>

  <footer>
    <p>AI-generated. Not investment advice. <a href="https://github.com" id="repo-link">View source on GitHub</a></p>
  </footer>

<script>
  // GitHub Pages serves /dashboard/index.html when the repo is configured for /dashboard.
  // Briefs live one level up at /briefs/. We fetch the directory listing via the GitHub API.
  const REPO_OWNER_AND_NAME = window.location.hostname.split('.')[0] + '/' + window.location.pathname.split('/')[1];
  const BRIEFS_API = `https://api.github.com/repos/${REPO_OWNER_AND_NAME}/contents/briefs`;
  const BRIEFS_RAW_BASE = `../briefs/`;

  document.getElementById('repo-link').href = `https://github.com/${REPO_OWNER_AND_NAME}`;

  async function loadBriefList() {
    try {
      const resp = await fetch(BRIEFS_API);
      if (!resp.ok) throw new Error('Could not fetch briefs');
      const files = await resp.json();
      const briefs = files
        .filter(f => f.name.endsWith('.md') && f.name !== '.gitkeep')
        .sort((a, b) => b.name.localeCompare(a.name));

      const list = document.getElementById('brief-list');
      if (briefs.length === 0) {
        list.innerHTML = '<li style="color: var(--text-dim); font-size: 0.85rem; padding: 0.5rem 0.75rem;">No briefs yet</li>';
        return;
      }

      list.innerHTML = briefs.map(b => {
        const date = b.name.replace('.md', '');
        return `<li><a href="#" data-file="${b.name}">${formatDate(date)}</a></li>`;
      }).join('');

      list.querySelectorAll('a').forEach(a => {
        a.addEventListener('click', (e) => {
          e.preventDefault();
          loadBrief(a.dataset.file, a);
        });
      });

      // Auto-load the most recent brief
      list.querySelector('a').click();
    } catch (err) {
      document.getElementById('brief-list').innerHTML =
        `<li style="color: var(--red); font-size: 0.85rem; padding: 0.5rem 0.75rem;">Error loading briefs</li>`;
    }
  }

  async function loadBrief(filename, linkEl) {
    document.querySelectorAll('.brief-list a').forEach(a => a.classList.remove('active'));
    if (linkEl) linkEl.classList.add('active');
    const content = document.getElementById('content');
    content.innerHTML = '<div class="empty"><p>Loading…</p></div>';
    try {
      const resp = await fetch(BRIEFS_RAW_BASE + filename);
      const md = await resp.text();
      content.innerHTML = marked.parse(md);
    } catch (err) {
      content.innerHTML = '<div class="empty"><p>Could not load this brief.</p></div>';
    }
  }

  function formatDate(isoDate) {
    const d = new Date(isoDate);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  loadBriefList();
</script>
</body>
</html>
