name: Daily Market Brief

on:
  # Manual trigger — lets us click a button to run on demand
  workflow_dispatch:

  # Scheduled trigger — runs daily at 06:00 UTC = 07:00 CET (winter) / 08:00 CEST (summer)
  # We keep it at 06:00 UTC so the brief lands consistently around 07:00 your local time in winter.
  schedule:
    - cron: "0 6 * * 1-5"  # Mon–Fri only (no weekends)

permissions:
  contents: write  # Allow the workflow to commit briefs back to the repo

jobs:
  generate-brief:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run the agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: |
          cd agent
          python main.py

      - name: Commit the new brief
        run: |
          git config user.name "Market Brief Agent"
          git config user.email "actions@github.com"
          git add briefs/
          if git diff --staged --quiet; then
            echo "No new brief to commit."
          else
            git commit -m "📊 Daily brief $(date -u +'%Y-%m-%d')"
            git push
          fi
